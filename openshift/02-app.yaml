apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-rag-workbench
  labels:
    app: redis-rag-workbench
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: redis-rag-workbench
  template:
    metadata:
      labels:
        app: redis-rag-workbench
    spec:
      containers:
        - name: app
          image: docker.io/jessicaemmons853/redis-rag-workbench:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
              name: http
          envFrom:
            - configMapRef:
                name: redis-rag-workbench-config
            - secretRef:
                name: redis-rag-workbench-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: app-data
              mountPath: /app/data
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: redis-rag-workbench-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis-rag-workbench
  labels:
    app: redis-rag-workbench
spec:
  selector:
    app: redis-rag-workbench
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: redis-rag-workbench
  labels:
    app: redis-rag-workbench
spec:
  to:
    kind: Service
    name: redis-rag-workbench
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
