apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: redis-rag-workbench
  labels:
    app: redis-rag-workbench
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: redis-rag-workbench
  labels:
    app: redis-rag-workbench
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: docker/Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: redis-rag-workbench:latest
  triggers:
    - type: ConfigChange
